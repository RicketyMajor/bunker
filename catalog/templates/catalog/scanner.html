<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escáner de Biblioteca</title>
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background-color: #1e1e1e;
        color: #ffffff;
      }
      h1 {
        color: #00d2ff;
      }
      p {
        color: #aaaaaa;
      }

      /* Contenedor del escáner */
      #reader {
        width: 100%;
        max-width: 500px;
        margin: 20px auto;
        background: #ffffff;
        color: #000000;
        border-radius: 10px;
        overflow: hidden;
      }

      #status {
        margin-top: 20px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #ffcc00;
        padding: 10px;
      }

      /* Estilos para el nuevo botón de reinicio */
      .btn-restart {
        margin-top: 15px;
        padding: 12px 24px;
        font-size: 16px;
        background-color: #00d2ff;
        color: #1e1e1e;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.2s;
      }
      .btn-restart:hover {
        background-color: #00a8cc;
      }
      .btn-error {
        background-color: #ff4444;
        color: #ffffff;
      }
      .btn-error:hover {
        background-color: #cc0000;
      }
    </style>
  </head>
  <body>
    <h1>Escáner de Biblioteca</h1>
    <p>Apunta la cámara al código de barras o sube una imagen.</p>

    <div id="reader"></div>

    <div id="status">Esperando escáner...</div>

    <script>
      const csrfToken = "{{ csrf_token }}";

      function onScanSuccess(decodedText, decodedResult) {
        const statusDiv = document.getElementById("status");
        statusDiv.innerText =
          "⏳ Enviando ISBN " + decodedText + " al servidor...";
        statusDiv.style.color = "#00d2ff";

        html5QrcodeScanner
          .clear()
          .then(() => {
            // Apunta al Purgatorio (inbox) en lugar de scan directo
            fetch("/api/books/inbox/", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken,
              },
              body: JSON.stringify({
                isbn: decodedText,
              }),
            })
              .then((response) =>
                response
                  .json()
                  .then((data) => ({ status: response.status, body: data })),
              )
              .then((res) => {
                if (res.status === 201 || res.status === 200) {
                  statusDiv.innerHTML = `
                    ✅ ¡Capturado!<br>ISBN ${decodedText} enviado a la Bandeja de Entrada.<br>
                    <button class="btn-restart" onclick="window.location.reload()">
                      🔄 Escanear siguiente tomo
                    </button>
                  `;
                  statusDiv.style.color = "#00ff00";
                } else {
                  let errMsg = res.body.isbn
                    ? "Este ISBN ya está en la bandeja."
                    : "Error desconocido.";
                  statusDiv.innerHTML = `
                    ❌ Error: ${errMsg}<br>
                    <button class="btn-restart btn-error" onclick="window.location.reload()">
                      🔄 Intentar de nuevo
                    </button>
                  `;
                  statusDiv.style.color = "#ff4444";
                }
              })
              // ... resto del código igual ...
              .catch((error) => {
                console.error("Error en la petición:", error);
                statusDiv.innerHTML = `
                  Error de conexión con el servidor.<br>
                  <button class="btn-restart btn-error" onclick="window.location.reload()">
                    Intentar de nuevo
                  </button>
                `;
                statusDiv.style.color = "#ff4444";
              });
          })
          .catch((error) => {
            console.error("Fallo al detener el escáner.", error);
          });
      }

      let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        {
          fps: 10,
          qrbox: { width: 250, height: 150 },
          formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13],
        },
        false,
      );

      html5QrcodeScanner.render(onScanSuccess, undefined);
    </script>
  </body>
</html>
