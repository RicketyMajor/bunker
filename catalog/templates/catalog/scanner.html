<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escáner de Biblioteca</title>
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background-color: #1e1e1e;
        color: #ffffff;
      }
      h1 {
        color: #00d2ff;
      }
      p {
        color: #aaaaaa;
      }

      /* Contenedor del escáner */
      #reader {
        width: 100%;
        max-width: 500px;
        margin: 20px auto;
        background: #ffffff; /* Fondo blanco para que los controles de la cámara se vean bien */
        color: #000000;
        border-radius: 10px;
        overflow: hidden;
      }

      #status {
        margin-top: 20px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #ffcc00;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>📚 Escáner de Biblioteca</h1>
    <p>Apunta la cámara al código de barras o sube una imagen.</p>

    <div id="reader"></div>

    <div id="status">Esperando escáner...</div>

    <script>
      // Inyectamos el token de seguridad de Django directamente en JavaScript
      const csrfToken = "{{ csrf_token }}";

      // Función que se ejecuta cuando el escáner lee algo con éxito
      function onScanSuccess(decodedText, decodedResult) {
        const statusDiv = document.getElementById("status");
        statusDiv.innerText = "⏳ Procesando ISBN: " + decodedText + "...";
        statusDiv.style.color = "#00d2ff";

        // 1. Detenemos la cámara
        html5QrcodeScanner
          .clear()
          .then(() => {
            // 2. Enviamos el ISBN a nuestro servidor Django (El Backend)
            fetch("/api/books/scan/", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken, // El token de seguridad de Django
              },
              body: JSON.stringify({
                isbn: decodedText,
              }),
            })
              .then((response) =>
                response
                  .json()
                  .then((data) => ({ status: response.status, body: data })),
              )
              .then((res) => {
                // 3. Manejamos la respuesta del servidor
                if (res.status === 201 || res.status === 200) {
                  // Éxito: El libro se guardó o ya existía
                  statusDiv.innerText =
                    res.body.message || "✅ Libro agregado con éxito.";
                  statusDiv.style.color = "#00ff00";
                } else {
                  // Error: No se encontró en OpenLibrary o faltó un dato
                  statusDiv.innerText =
                    "❌ Error: " +
                    (res.body.error || "No se pudo agregar el libro.");
                  statusDiv.style.color = "#ff4444";
                }
              })
              .catch((error) => {
                console.error("Error en la petición:", error);
                statusDiv.innerText = "❌ Error de conexión con el servidor.";
                statusDiv.style.color = "#ff4444";
              });
          })
          .catch((error) => {
            console.error("Fallo al detener el escáner.", error);
          });
      }

      let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        {
          fps: 10,
          qrbox: { width: 250, height: 150 },
          formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13],
        },
        false,
      );

      html5QrcodeScanner.render(onScanSuccess, undefined);
    </script>
  </body>
</html>
