services:
  # El contenedor de la base de datos
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=library_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecret
    ports:
      - "5436:5432"

  # El contenedor aplicación Django / CLI
  web:
    build: .
    restart: unless-stopped
    # Sincroniza la carpeta actual con el contenedor para no tener que reconstruir 
    # la imagen cada vez que se edite una línea de código en Python.
    volumes:
      - .:/app
      - bunker_backups:/app/backups
    ports:
      - "8009:8000"
    depends_on:
      - db
    environment:
      - POSTGRES_DB=library_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecret
      - POSTGRES_HOST=db  
      - POSTGRES_PORT=5432

# --- Microservicios Distribuidos Node.js ---
  scraper-books:
    build: ./scraper
    restart: unless-stopped
    command: npm run start:books
    volumes:
      - ./scraper:/app
      - /app/node_modules
      - ./scraper_logs:/app/logs
    depends_on:
      - web

  scraper-movies:
    build: ./scraper
    restart: unless-stopped
    command: npm run start:movies
    env_file:
      - .env # Pasa la clave TMDB_API_KEY
    volumes:
      - ./scraper:/app
      - /app/node_modules
      - ./scraper_logs:/app/logs
    depends_on:
      - web

  scraper-music:
    build: ./scraper
    restart: unless-stopped
    command: npm run start:music
    volumes:
      - ./scraper:/app
      - /app/node_modules
      - ./scraper_logs:/app/logs
    depends_on:
      - web

volumes:
  postgres_data:
    name: library_manager_postgres_data
  bunker_backups:
    name: bunker_backups_data